services:
  # Backend Laravel Service
  - type: web
    name: taxlegal-backend
    env: docker
    dockerContext: backend
    plan: free
    envVars:
      - key: APP_KEY
        sync: false # Set this in Render dashboard or let it be generated
      - key: APP_DEBUG
        value: false
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: mysql
      - key: DB_URL
        sync: false # Paste your Clever Cloud MySQL URL here


  # Frontend React Service (Static Site)
  - type: web
    name: taxlegal-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taxlegal-backend
          property: host
