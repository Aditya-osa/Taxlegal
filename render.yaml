services:
  # MySQL Database - Redeploy
  - type: pserv
    name: taxlegal-db
    env: docker
    image: mysql:8.0
    plan: free
    envVars:
      - key: MYSQL_DATABASE
        value: taxlegal_blog
      - key: MYSQL_USER
        value: taxlegal_user
      - key: MYSQL_PASSWORD
        value: taxlegal_password
      - key: MYSQL_ROOT_PASSWORD
        value: root_password
    
  # Backend Laravel Service
  - type: web
    name: taxlegal-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: APP_KEY
        sync: false # Set this in Render dashboard or let it be generated
      - key: APP_DEBUG
        value: false
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: taxlegal-db
          property: host
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        value: taxlegal_blog
      - key: DB_USERNAME
        value: taxlegal_user
      - key: DB_PASSWORD
        value: taxlegal_password


  # Frontend React Service (Static Site)
  - type: web
    name: taxlegal-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taxlegal-backend
          property: host
