services:
  # Backend Laravel Service
  - type: web
    name: taxlegal-backend
    env: docker
    dockerContext: backend
    plan: free
    envVars:
      - key: APP_KEY
        sync: false # Set this in Render dashboard or let it be generated
      - key: APP_DEBUG
        value: false
      - key: APP_ENV
        value: production
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: taxlegal-db
          property: connectionString

  # Frontend React Service (Static Site)
  - type: static
    name: taxlegal-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taxlegal-backend
          property: host

databases:
  - name: taxlegal-db
    plan: free
