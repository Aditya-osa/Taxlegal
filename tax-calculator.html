<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-serif { font-family: 'Playfair Display', serif; }

    /* Hexagon */
    .hex {
      width: 70px;
      height: 70px;
      background: #1e293b;
      clip-path: polygon(
        25% 6.7%, 75% 6.7%, 
        100% 50%, 
        75% 93.3%, 25% 93.3%, 
        0% 50%
      );
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

  <title>Legal Contact</title>
</head>

<body class="bg-gray-100">
<section class="py-24 bg-[#f5f7fa]">
  <div class="max-w-5xl mx-auto px-6">

    <!-- Heading -->
    <h2 class="text-4xl md:text-5xl font-serif text-gray-900 mb-12">
      Correspondence Details
    </h2>
    <div class="w-20 h-[2px] bg-[#c9a34e] mb-16"></div>

    <!-- Ribbon Stack -->
    <div class="space-y-6">

      <!-- ITEM -->
      <div class="flex items-center group">
        
        <!-- Icon Box -->
        <div class="w-20 h-20 bg-[#1e293b] text-[#c9a34e] flex items-center justify-center rounded-xl shadow-md z-10">
          ✉️
        </div>

        <!-- Ribbon -->
        <div class="flex-1 -ml-6 bg-gradient-to-r from-[#1e293b] to-[#334155] text-white p-6 pl-10 rounded-r-xl shadow-md hover:shadow-lg transition">
          <h3 class="font-serif text-xl">Email Us</h3>
          <p class="text-gray-300 mt-1">info@taxlegal.in</p>
        </div>
      </div>

      <!-- ITEM -->
      <div class="flex items-center group">
        
        <div class="w-20 h-20 bg-[#1e293b] text-[#c9a34e] flex items-center justify-center rounded-xl shadow-md z-10">
          📞
        </div>

        <div class="flex-1 -ml-6 bg-gradient-to-r from-[#1e293b] to-[#334155] text-white p-6 pl-10 rounded-r-xl shadow-md hover:shadow-lg transition">
          <h3 class="font-serif text-xl">Call Us</h3>
          <p class="text-gray-300 mt-1">
            +91-9819705068 / +91-9869005068
          </p>
        </div>
      </div>

      <!-- ITEM -->
      <div class="flex items-center group">
        
        <div class="w-20 h-20 bg-[#1e293b] text-[#c9a34e] flex items-center justify-center rounded-xl shadow-md z-10">
          📍
        </div>

        <div class="flex-1 -ml-6 bg-gradient-to-r from-[#1e293b] to-[#334155] text-white p-6 pl-10 rounded-r-xl shadow-md hover:shadow-lg transition">
          <h3 class="font-serif text-xl">Visit Us</h3>
          <p class="text-gray-300 mt-1">
            401-404, Prabhat Center, CBD Belapur, Navi Mumbai - 400614, India
          </p>
        </div>
      </div>

    </div>

  </div>
</section>

</body>
</html>
